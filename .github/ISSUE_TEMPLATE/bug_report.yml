name: Bug report
description: Something does not work the way it should.
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The fastest path to a fix
        is a minimal reproducer (5--10 CSV rows, the exact command, and the
        actual vs. expected output).
  - type: input
    id: version
    attributes:
      label: CleanTest-Agent version / commit SHA
      placeholder: "0.1.0  or  abc1234"
    validations:
      required: true
  - type: dropdown
    id: python
    attributes:
      label: Python version
      options: ["3.10", "3.11", "3.12", "other (specify in description)"]
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command you ran
      render: bash
      placeholder: |
        cleantest --input_csv data/sample_5000.csv --output_dir output/
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What actually happened
      placeholder: Paste the full traceback or unexpected output.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected to happen
    validations:
      required: true
  - type: textarea
    id: reproducer
    attributes:
      label: Minimal reproducer (CSV rows or attached file)
      description: 5--10 rows is usually enough. Drag-and-drop a small CSV here if convenient.
